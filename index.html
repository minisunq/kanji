<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>교육한자 카드 v4.4</title>
<style>
:root{--bg:#101216;--card:#191d24;--card2:#232936;--txt:#f5f5f5;--mut:#aab2c0;--line:#343b49;--a:#8ab4ff;--g:#78d88d;--r:#ff8585}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;height:100%}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Noto Sans JP",sans-serif}
main{max-width:680px;margin:auto;padding:14px}
body.study-mode{overflow:hidden}
body.study-mode main{height:var(--app-height,100dvh);padding:10px 10px calc(18px + env(safe-area-inset-bottom))}
body.study-mode #appTitle,body.study-mode #appSub{display:none}
h1{font-size:20px;margin:6px 0 2px}
.sub{color:var(--mut);font-size:13px;margin-bottom:10px;line-height:1.45}
.box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px}
select,button{width:100%;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:12px;padding:13px;font-size:16px;font-family:inherit;appearance:auto}
button{cursor:pointer;touch-action:manipulation}
button:active{transform:scale(.99)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mt{margin-top:8px}
#study:not(.hide){display:flex;flex-direction:column;gap:8px;min-height:calc(var(--app-height,100dvh) - 20px);padding:10px}
.studyTop{display:flex;align-items:center;gap:10px;flex:0 0 auto;min-height:34px}
.homeMini{width:auto;min-width:54px;padding:8px 10px;border-radius:999px;background:transparent;color:var(--mut);font-size:13px}
.studyStats{margin-left:auto;text-align:right;color:var(--mut);font-size:13px;line-height:1.35;white-space:nowrap}
.studyStats .prog{color:var(--txt);font-weight:700;margin-right:10px}
.studyStats b{color:var(--txt)}
.card{position:relative;flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#202632,#171a21);border:1px solid var(--line);border-radius:22px;margin:0;padding:18px;overflow:hidden}
.gradeBadge{position:absolute;top:12px;left:12px;color:var(--a);border:1px solid #405a80;background:rgba(35,41,54,.82);border-radius:999px;padding:4px 9px;font-size:13px;line-height:1;z-index:2}
.front{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100%}
.kanji{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif CJK JP",serif;font-size:clamp(110px,38vw,190px);line-height:1}
.hint,.mut{color:var(--mut);font-size:13px}
.hint{margin-top:16px}
.back{text-align:left;width:100%;max-width:560px;max-height:100%;overflow:auto;padding:34px 2px 2px;-webkit-overflow-scrolling:touch}
.big{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif CJK JP",serif;text-align:center;font-size:clamp(46px,17vw,70px);line-height:1;margin-bottom:6px}
.row{border-top:1px solid var(--line);padding:6px 0;line-height:1.42}
.row:first-child{border-top:0}
.lab{display:inline-block;width:86px;color:var(--mut);font-size:14px;vertical-align:top}
.val{font-size:clamp(15px,4vw,17px);white-space:pre-wrap}
.answerBar{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:0 0 auto}
.answerBar button{min-height:54px;font-size:17px;font-weight:700}
.red{color:var(--r);border-color:#704040}
.green{color:var(--g);border-color:#3d7048}
.blue{color:var(--a);border-color:#405a80}
.hide{display:none!important}
.summary{line-height:1.6}
.wrong{border-top:1px solid var(--line);padding:8px 0}
.small{font-size:12px;color:var(--mut);text-align:center;margin-top:10px;line-height:1.45}
.warn{background:#2a2014;border:1px solid #6b4d24;color:#ffdca8;border-radius:12px;padding:10px;margin:10px 0;font-size:13px;line-height:1.45}
@media(max-width:440px){
  .grid,.grid3{grid-template-columns:1fr}
  main{padding:12px}
  body.study-mode main{padding:8px 8px calc(22px + env(safe-area-inset-bottom))}
  #study:not(.hide){min-height:calc(var(--app-height,100dvh) - 16px);padding:9px;gap:7px}
  .homeMini{min-width:48px;padding:7px 9px}
  .studyStats{font-size:12px}
  .lab{display:block;width:auto;margin-bottom:2px}
  .row{padding:6px 0}
  .answerBar button{min-height:52px}
}
</style>

<!-- v4.4: label fix, no-repeat session logic, duplicate guard, answer lock -->
</head>
<body>
<main>
<h1 id="appTitle">교육한자 랜덤 카드</h1>
<div class="sub" id="appSub">저장 없음 · 닫으면 리셋 · 랜덤 50개 / 전체 1회전 / 틀린 것 다시 보기</div>

<section class="box" id="setup">
<div class="warn" id="jsWarn">버튼이 안 눌리면 파일 앱 미리보기가 아니라 Safari/Chrome에서 열어야 합니다. 이 문구가 계속 보이면 JavaScript가 실행되지 않는 상태입니다.</div>
<div class="grid">
<select id="grade">
<option value="all">전체 1026자</option>
<option value="1">小1 80자</option>
<option value="2">小2 160자</option>
<option value="3">小3 200자</option>
<option value="4">小4 202자</option>
<option value="5">小5 193자</option>
<option value="6">小6 191자</option>
</select>
<select id="mode">
<option value="50">랜덤 50개</option>
<option value="all">전체 1회전</option>
</select>
</div>
<button class="blue mt" id="startBtn" type="button">시작</button>
<div class="small">진행상황을 저장하지 않습니다. 현재 열린 화면 안에서만 기록됩니다.</div>
</section>

<section class="box hide" id="study">
<div class="studyTop">
<button class="homeMini" id="homeBtn" type="button">처음</button>
<div class="studyStats"><span class="prog" id="prog">0/0</span><span>맞음 <b id="ok">0</b> · 틀림 <b id="bad">0</b></span></div>
</div>
<div class="card" id="card">
<div class="gradeBadge" id="fg"></div>
<div id="front" class="front"><div class="kanji" id="fk"></div><div class="hint">탭해서 정답 보기</div></div>
<div id="back" class="back hide"></div>
</div>
<div class="answerBar"><button class="red" id="wrongBtn" type="button">몰랐음</button><button class="green" id="rightBtn" type="button">알았음</button></div>
</section>

<section class="box hide" id="done">
<div class="summary" id="sum"></div>
<div class="grid mt"><button class="red" id="retryBtn" type="button">틀린 것만 다시</button><button class="blue" id="newRoundBtn" type="button">새 라운드</button></div>
<button class="mt" id="homeBtn2" type="button">처음으로</button>
</section>
</main>

let pool=[], q=[], cur=null, fl=false, seen=0, ok=0, wrong=[], used={}, answerLock=false, sessionTotal=0;
const $ = function(id){return document.getElementById(id);};
function esc(s){return String(s||"").replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m] || m;});}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));let t=a[i];a[i]=a[j];a[j]=t;}return a;}
function uniqueByKanji(list){
 let seenMap={};
 return (list||[]).filter(function(c){
  let key=String(c[0]);
  if(seenMap[key]) return false;
  seenMap[key]=true;
  return true;
 });
}
function filtered(){let g=$("grade").value;return uniqueByKanji(D.filter(function(c){return g==="all" || String(c[1])===g;}));}
function show(section){["setup","study","done"].forEach(function(id){$ (id).classList.add("hide");});$(section).classList.remove("hide");document.body.classList.toggle("study-mode",section==="study");}
function start(list){
 pool=uniqueByKanji(list||filtered());
 q=shuffle(pool);
 if($("mode").value==="50"&&!list)q=q.slice(0,Math.min(50,q.length));
 seen=0;ok=0;wrong=[];used={};cur=null;fl=false;answerLock=false;sessionTotal=q.length;
 show("study");
 next();
}
function next(){
 fl=false;answerLock=false;
 while(q.length){
  let candidate=q.shift();
  let key=String(candidate[0]);
  if(used[key]) continue;
  used[key]=true;
  cur=candidate;
  render();
  return;
 }
 finish();
}
function render(){
 $("prog").textContent=Math.min(seen+1,sessionTotal)+"/"+sessionTotal;
 $("ok").textContent=ok;
 $("bad").textContent=wrong.length;
 $("fg").textContent="小"+cur[1];
 $("fk").textContent=cur[0];
 $("front").classList.toggle("hide",fl);
 $("back").classList.toggle("hide",!fl);
 $("back").innerHTML='<div class="big">'+esc(cur[0])+'</div>'
 +'<div class="row"><span class="lab">한국어 훈음</span><span class="val">'+esc(cur[2])+'</span></div>'
 +'<div class="row"><span class="lab">音読み</span><span class="val">'+esc(cur[4])+'</span></div>'
 +'<div class="row"><span class="lab">訓読み</span><span class="val">'+esc(cur[5])+'</span></div>'
 +'<div class="row"><span class="lab">예시</span><span class="val">'+esc(cur[6])+'</span></div>';
}
function flip(e){if(e)e.stopPropagation(); if(!cur)return;fl=!fl;render();}
function answer(v,e){
 if(e)e.stopPropagation();
 if(!cur || answerLock)return;
 answerLock=true;
 let answered=cur;
 cur=null;
 seen++;
 if(v)ok++;
 else if(!wrong.some(function(c){return String(c[0])===String(answered[0]);})) wrong.push(answered);
 next();
}
function finish(){
 show("done");
 let list=wrong.map(function(c){return '<div class="wrong"><b>'+esc(c[0])+'</b> · 小'+esc(c[1])+' · '+esc(c[2])+' · '+esc(c[3])+'<br><span class="mut">'+esc(c[6])+'</span></div>';}).join("");
 $("sum").innerHTML='<h2>끝</h2><p>총 '+seen+'개 중 <b>'+ok+'</b>개 맞음, <b>'+wrong.length+'</b>개 틀림.</p>'+(wrong.length?'<h3>틀린 카드</h3>'+list:'<p>틀린 카드 없음 🎉</p>');
}
function retryWrong(){if(!wrong.length)return;start(wrong.slice());}
function reset(){cur=null;q=[];wrong=[];seen=0;ok=0;fl=false;used={};answerLock=false;sessionTotal=0;show("setup");}
document.addEventListener("DOMContentLoaded", function(){
 $("jsWarn").classList.add("hide");
 $("startBtn").addEventListener("click", function(e){start(null,e);});
 $("card").addEventListener("click", flip);
 $("wrongBtn").addEventListener("click", function(e){answer(false,e);});
 $("rightBtn").addEventListener("click", function(e){answer(true,e);});
 $("homeBtn").addEventListener("click", reset);
 $("homeBtn2").addEventListener("click", reset);
 $("retryBtn").addEventListener("click", retryWrong);
 $("newRoundBtn").addEventListener("click", function(e){start(null,e);});
 window.addEventListener("keydown",function(e){if(e.key===" "){e.preventDefault();flip(e);} if(e.key==="1")answer(false,e); if(e.key==="2")answer(true,e);});
});
})();
</script>
